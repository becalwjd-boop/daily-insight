name: Save Daily News

on:
  schedule:
    - cron: "59 14 * * *"
  workflow_dispatch:

jobs:
  save-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Create .env.local
        run: |
          echo "NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}" >> .env.local
          echo "NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}" >> .env.local

      - name: Save News
        run: npx tsx scripts/save-today.ts

      - name: Commit Archive
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/archives/*.json

          if git diff --cached --quiet; then
            echo "No archive changes to commit"
            exit 0
          fi

          git commit -m "auto archive update"

          git pull --rebase origin main
          git push origin main